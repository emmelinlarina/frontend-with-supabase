<!doctype html>
<html lang="en">
  <head>
    <title>Login</title>
    <link rel="icon" type="image/png" sizes="32x32" href="" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Login" />

    <script src="https://cdn.tailwindcss.com"></script>
    <script
      src="https://kit.fontawesome.com/e0e8f3b90b.js"
      crossorigin="anonymous"
    ></script>
  </head>

  <body class="min-h-screen bg-white text-zinc-800 font-radley">
    <nav class="bg-white shadow-sm border-b px-4 py-3">
      <div class="max-w-4xl mx-auto flex justify-between items-center">
        <a href="index.html" class="text-xl font-bold">Logo</a>
      </div>
    </nav>

    <main class="flex flex-col items-center justify-center py-12 px-4">
      <div>
        <a
          href="index.html"
          class="inline-flex items-center gap-2 text-sm font-medium text-gray-600 hover:text-gray-900 mb-4"
        >
          <i class="fas fa-arrow-left"></i>
          Back to Home
        </a>
      </div>
      <section
        class="w-full max-w-md bg-white rounded-2xl shadow-sm border p-6"
      >
        <form id="loginForm" class="grid gap-4" novalidate>
          <fieldset class="grid gap-2">
            <div class="grid gap-2">
              <label for="email" class="text-sm font-medium">Email</label>
              <input
                type="email"
                id="email"
                name="email"
                autocomplete="email"
                required
                class="w-full rounded-md border border-zinc-300 bg-white px-3 py-2 text-sm focus:border-brown-500 focus:outline-none focus:ring-1 focus:ring-brown-500"
                placeholder="name@stud.noroff.no"
              />
            </div>

            <div class="grid gap-2">
              <label for="password" class="text-sm font-medium">Password</label>
              <input
                type="password"
                id="password"
                name="password"
                minlength="8"
                autocomplete="current-password"
                required
                aria-describedby="passwordHelp"
                class="w-full rounded-md border border-zinc-300 bg-white px-3 py-2 text-sm focus:border-brown-500 focus:outline-none focus:ring-1 focus:ring-brown-500"
                placeholder="••••••••"
              />
              <p id="passwordHelp" class="text-xs text-zinc-500 mt-1"></p>
            </div>

            <button
              type="submit"
              class="mt-2 inline-flex w-full items-center justify-center rounded-md bg-cyan-700 px-4 py-3 text-xl font-semibold font-rasa text-white focus:ring-2 focus:bg-cyan-600 focus:ring-offset-2 tracking-wider"
            >
              LOGIN
            </button>

            <p class="text-center text-sm text-zinc-400">
              Don't have an account?
              <a
                href="./register.html"
                class="font-bold text-cyan-700 hover:text-cyan-600"
                >Register</a
              >
            </p>
          </fieldset>
        </form>
      </section>
      <div
        id="message-container"
        class="hidden rounded-xl font-medium text-sm duration-200 mt-4 duration-300"
        role="status"
        aria-live="polite"
        aria-atomic="true"
      ></div>
    </main>
    <script type="module" src="js/login.js"></script>
  </body>
</html>
