<!doctype html>
<html lang="en">
  <head>
    <title>Register</title>
    <link rel="icon" type="image/png" sizes="32x32" href="" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Register" />

    <script src="https://cdn.tailwindcss.com"></script>
    <script
      src="https://kit.fontawesome.com/e0e8f3b90b.js"
      crossorigin="anonymous"
    ></script>
  </head>

  <body class="min-h-screen bg-white text-zinc-800 font-radley">
    <header class="w-full border-b bg-white">
      <div
        class="max-w-5xl mx-auto px-4 py-4 flex justify-between items-center"
      >
        <h1 class="text-xl font-bold tracking-tight">Logo</h1>
      </div>
    </header>

    <main class="flex items-center justify-center py-12 px-4">
      <section
        class="w-full max-w-md bg-white rounded-2xl shadow-sm border p-6"
      >
        <h2 class="text-2xl font-bold mb-6 tracking-tight">New Post</h2>

        <form class="grid gap-4">
          <fieldset class="grid gap-4">
            <div class="grid gap-1">
              <label for="title" class="text-sm font-medium text-zinc-700"
                >Title</label
              >
              <input
                type="text"
                name="title"
                id="title"
                placeholder="Enter title"
                required
                class="w-full rounded-md border border-zinc-300 px-3 py-2 text-sm"
              />
            </div>

            <div class="grid gap-1">
              <label for="content" class="text-sm font-medium text-zinc-700"
                >Content</label
              >
              <textarea
                name="content"
                id="content"
                placeholder="Enter content"
                required
                class="w-full rounded-md border border-zinc-300 px-3 py-2 text-sm"
              ></textarea>
            </div>

            <button
              type="submit"
              class="mt-2 w-full rounded-md bg-cyan-500 text-white py-2 font-semibold hover:bg-cyan-600 focus:outline-none focus:ring-2 focus:ring-cyan-500 focus:ring-offset-2"
            >
              Create post
            </button>
            <div
              id="message-container"
              class="hidden rounded-xl border border-brand-700/30 bg-brand-700/10 text-brand-700 px-4 py-3 text-sm"
              role="status"
              aria-live="polite"
              aria-atomic="true"
            ></div>
          </fieldset>
        </form>
      </section>
    </main>
    <script type="module" src="js/posts.js"></script>
  </body>
</html>
