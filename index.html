<!doctype html>
<html lang="en">
  <head>
    <title>Home</title>
    <link rel="icon" type="image/png" sizes="32x32" href="" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Home" />

    <script src="https://cdn.tailwindcss.com"></script>
    <script
      src="https://kit.fontawesome.com/e0e8f3b90b.js"
      crossorigin="anonymous"
    ></script>
  </head>

  <body class="min-h-screen bg-white text-zinc-800 font-radley">
    <nav
      class="sticky top-0 z-10 border-b border-gray-200/80 bg-white/80 backdrop-blur-sm"
    >
      <div
        class="max-w-4xl mx-auto flex justify-between items-center px-4 py-4"
      >
        <a
          href="index.html"
          class="text-xl font-bold tracking-tight text-gray-900 hover:text-orange-600 transition-colors"
          >Logo</a
        >

        <div class="flex items-center gap-2 sm:gap-3">
          <a
            id="login-link"
            href="login.html"
            class="rounded-full px-4 py-2 text-sm font-medium text-gray-600 bg-gray-100 hover:text-gray-900"
            >Login
          </a>

          <a
            id="register-link"
            href="register.html"
            class="rounded-full px-4 py-2 text-sm font-medium text-gray-600 bg-gray-100 hover:text-gray-900"
            >Register
          </a>

          <button
            id="logout-btn"
            class="hidden rounded-full px-4 py-2 text-sm font-medium text-gray-600 bg-gray-100 hover:text-gray-900"
          >
            Logout
          </button>
        </div>
      </div>
    </nav>

    <main class="flex flex-col items-center justify-center py-10 px-4 sm:py-14">
      <section
        class="mb-6 w-full max-w-md rounded-3xl bg-white/90 shadow-sm border border-zinc-200 p-6"
      >
        <h2
          class="text-xl font-semibold uppercase tracking-[0.1em] text-gray-900"
        >
          Dashboard
        </h2>
      </section>
      <section
        id="create-post"
        class="w-full max-w-md rounded-3xl bg-white/90 shadow-sm border border-zinc-200 p-6 mb-10"
      >
        <form class="grid gap-4">
          <fieldset class="grid gap-4">
            <div class="grid gap-1">
              <label for="title" class="text-sm font-semibold text-gray-800"
                >Title</label
              >
              <input
                type="text"
                name="title"
                id="title"
                placeholder="Enter title"
                required
                class="w-full rounded-md border border-gray-300 bg-gray-50 px-3 py-2 text-sm"
              />
            </div>

            <div class="grid gap-1">
              <label for="content" class="text-sm font-semibold text-gray-800"
                >Content
              </label>
              <textarea
                name="content"
                id="content"
                placeholder="Enter content"
                required
                rows="5"
                class="w-full rounded-xl border border-gray-300 bg-gray-50 px-3 py-2 text-sm"
              ></textarea>
            </div>

            <button
              type="submit"
              class="mt-2 text-lg w-full rounded-md bg-cyan-700 text-white py-2 font-semibold hover:bg-cyan-600 focus:outline-none focus:ring-2 focus:ring-cyan-500 focus:ring-offset-2"
            >
              Create post
            </button>
            <div class="min-h-[58px] flex items-center justify-center">
              <div
                id="message-container"
                class="hidden rounded-xl font-medium text-brand-700 text-sm duration-200"
                role="status"
                aria-live="polite"
                aria-atomic="true"
              ></div>
            </div>
          </fieldset>
        </form>
      </section>

      <section
        class="w-full mb-6 max-w-md bg-white rounded-3xl shadow-sm border border-gray-200 p-6 bg-white/90"
      >
        <h2
          class="text-xl font-semibold uppercase tracking-[0.01em] text-gray-900"
        >
          Articles
        </h2>
      </section>
      <section class="w-full max-w-md rounded-3xl">
        <div id="posts-list" class="space-y-4"></div>
      </section>
    </main>
    <script type="module" src="js/posts.js"></script>
  </body>
</html>
